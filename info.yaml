# Tiny Tapeout project information

project:
  title: "SPI Master Controller"
  author: "Nevin Philip"
  discord: ""
  description: "8-bit SPI Master Controller using FSM and Shift Register"
  language: "Verilog"
  clock_hz: 0

tiles: "1x1"

top_module: "tt_um_spi_master"

source_files:
  - "project.v"

pinout:

  # Inputs
  ui[0]: "Data bit 0"
  ui[1]: "Data bit 1"
  ui[2]: "Data bit 2"
  ui[3]: "Data bit 3"
  ui[4]: "Data bit 4"
  ui[5]: "Data bit 5"
  ui[6]: "Data bit 6"
  ui[7]: "Data bit 7"

  # Outputs
  uo[0]: "MOSI"
  uo[1]: "SCLK"
  uo[2]: "CS"
  uo[3]: "BUSY"
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "START"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

yaml_version: 6
